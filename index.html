<!DOCTYPE html>
<html>
<head>
  <title>Supreme True Clean</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="topbar">
  <h1>Supreme True Clean</h1>
  <a href="app.html" class="btn">Login</a>
</header>

<section class="hero">
  <h1>Premium Cleaning Services</h1>
  <p>Book instantly. Track everything. Supreme quality.</p>
</section>

<section class="section">
  <h2>Services</h2>

  <div class="card">
    <h3>Residential Cleaning</h3>
    <input id="sqft" placeholder="Enter Sq Ft">
    <button onclick="calcSqFt()">Calculate</button>
    <p id="sqftResult"></p>
  </div>

  <div class="card">
    <h3>Trash Bin Cleaning</h3>
    <input id="bins" placeholder="Number of bins">
    <button onclick="calcBins()">Calculate</button>
    <p id="binResult"></p>
  </div>

  <div class="card">
    <h3>Flat Services</h3>
    <select id="flatService">
      <option value="100">Basic Cleaning - $100</option>
      <option value="200">Deep Cleaning - $200</option>
    </select>
  </div>

  <button onclick="bookService()" class="btn-primary">Book Service</button>
</section>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="assets/firebase.js"></script>

<script>
function calcSqFt(){
  const sqft = document.getElementById("sqft").value;
  const price = sqft * 0.15;
  document.getElementById("sqftResult").innerText = "$" + price;
}

function calcBins(){
  const bins = document.getElementById("bins").value;
  const price = bins * 25;
  document.getElementById("binResult").innerText = "$" + price;
}

async function bookService(){
  const data = {
    sqft: document.getElementById("sqft").value,
    bins: document.getElementById("bins").value,
    service: document.getElementById("flatService").value,
    createdAt: new Date()
  };

  await firebase.firestore().collection("appointments").add(data);

  alert("Booked!");
}
</script>

</body>
</html>
