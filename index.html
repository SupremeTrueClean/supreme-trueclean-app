<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Supreme True Clean</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="stc-app">
  <div class="stc-wrapper">
    <header class="stc-header">
      <div class="stc-logo">Supreme True Clean!</div>
      <p class="stc-subtitle">Select your role to continue</p>
    </header>

    <main class="stc-roles">
      <button class="stc-role-card" data-role="admin">
        <div class="stc-role-icon">🛠️</div>
        <div class="stc-role-text">
          <h2>Admin</h2>
          <p>Dashboard &amp; management</p>
        </div>
      </button>

      <button class="stc-role-card" data-role="customer">
        <div class="stc-role-icon">🧼</div>
        <div class="stc-role-text">
          <h2>Customer</h2>
          <p>Services &amp; subscriptions</p>
        </div>
      </button>

      <button class="stc-role-card" data-role="cleaner">
        <div class="stc-role-icon">🧹</div>
        <div class="stc-role-text">
          <h2>Cleaner</h2>
          <p>Jobs &amp; operations</p>
        </div>
      </button>

      <button class="stc-role-card" data-role="leadgen">
        <div class="stc-role-icon">📣</div>
        <div class="stc-role-text">
          <h2>Lead Gen</h2>
          <p>Leads &amp; outreach</p>
        </div>
      </button>
    </main>

    <footer class="stc-footer">
      <span>v1.0 - Web App</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
