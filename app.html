<!DOCTYPE html>
<html>
<head>
  <title>Supreme True Clean App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <button onclick="switchTab('login')">Login</button>
  <button onclick="switchTab('customer')">Customer</button>
  <button onclick="switchTab('sales')">Sales</button>
  <button onclick="switchTab('tech')">Tech</button>
  <button onclick="switchTab('admin')">Admin</button>
</div>

<!-- LOGIN -->
<div id="login" class="tab" style="display:block;">
  <div class="card-box">
    <h2>Welcome Back</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="action-btn" onclick="login()">Login</button>
    <button class="action-btn" onclick="signUp()">Create Account</button>
  </div>
</div>

<!-- CUSTOMER -->
<div id="customer" class="tab">
  <h2>Customer Dashboard</h2>
  <div class="item-card">
    <p>View your services, orders, and history here.</p>
  </div>
</div>

<!-- SALES -->
<div id="sales" class="tab">
  <h2>Sales Dashboard</h2>

  <div class="card-box">
    <h3>Add Lead</h3>

    <input id="leadName" placeholder="Name">
    <input id="leadPhone" placeholder="Phone">
    <input id="leadAddress" placeholder="Address">

    <button class="action-btn" onclick="addLead()">Add Lead</button>
  </div>

  <h3>Leads</h3>
  <div id="leadsList"></div>
</div>

<!-- TECH -->
<div id="tech" class="tab">
  <h2>Technician Dashboard</h2>
  <div class="item-card">
    <p>Assigned jobs will appear here.</p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="tab">
  <h2>Admin Panel</h2>

  <div class="card-box">
    <h3>User Management</h3>
    <button class="action-btn" onclick="loadUsers()">Load Users</button>
    <div id="usersList"></div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script src="admin.js"></script>
<script src="leads.js"></script>

</body>
</html>
