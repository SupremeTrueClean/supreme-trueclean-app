<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <button onclick="switchTab('login')">Login</button>
  <button onclick="switchTab('customer')">Customer</button>
  <button onclick="switchTab('sales')">Sales</button>
  <button onclick="switchTab('tech')">Tech</button>
  <button onclick="switchTab('admin')">Admin</button>
</div>

<div id="login" class="tab" style="display:block;">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="signUp()">Sign Up</button>
</div>

<div id="customer" class="tab">Customer Dashboard</div>

<div id="sales" class="tab">
  <h2>Leads</h2>

  <input id="leadName" placeholder="Name">
  <input id="leadPhone" placeholder="Phone">
  <input id="leadAddress" placeholder="Address">

  <button onclick="addLead()">Add Lead</button>

  <div id="leadsList"></div>
</div>

<div id="tech" class="tab">Technician Dashboard</div>

<div id="admin" class="tab">
  <h2>Admin Panel</h2>

  <button onclick="loadUsers()">Load Users</button>
  <div id="usersList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script src="admin.js"></script>
<script src="leads.js"></script>

</body>
</html>
