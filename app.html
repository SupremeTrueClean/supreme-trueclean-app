<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <button onclick="switchTab('login')">Login</button>
  <button onclick="switchTab('customer')">Customer</button>
  <button onclick="switchTab('sales')">Sales</button>
  <button onclick="switchTab('tech')">Tech</button>
  <button onclick="switchTab('admin')">Admin</button>
</div>

<!-- LOGIN -->
<div id="login" class="tab" style="display:block;">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="signUp()">Sign Up</button>
</div>

<!-- CUSTOMER -->
<div id="customer" class="tab">
  <h2>Customer Dashboard</h2>
</div>

<!-- SALES -->
<div id="sales" class="tab">
  <h2>Sales Dashboard</h2>
</div>

<!-- TECH -->
<div id="tech" class="tab">
  <h2>Technician Dashboard</h2>
</div>

<!-- ADMIN -->
<div id="admin" class="tab">
  <h2>Admin Panel</h2>
  <h3>User Management</h3>

<button onclick="loadUsers()">Load Users</button>

<div id="usersList"></div>

  <input id="newAdmin" placeholder="Add admin email">
  <button onclick="addAdmin()">Add</button>

  <div id="adminList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="auth.js"></script>
<script src="app.js"></script>
<script src="admin.js"></script>

</body>
</html>
